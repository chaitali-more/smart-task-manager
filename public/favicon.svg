<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Main Rounded Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad)" />
  <!-- Card Backdrop -->
  <rect x="108" y="108" width="296" height="296" rx="52" fill="#ffffff" fill-opacity="0.18" />
  <!-- Checkbox Base -->
  <rect x="132" y="132" width="248" height="248" rx="44" fill="#ffffff" filter="url(#shadow)" />
  <!-- Vibrant Teal Checkmark -->
  <path d="M188 256 l48 48 l88 -88" fill="none" stroke="#0d9488" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" />
</svg>